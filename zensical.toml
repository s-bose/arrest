[project]
site_name = "Arrest"
site_author = "Shiladitya Bose"
repo_name = "s-bose/arrest"
repo_url = "https://github.com/s-bose/arrest"
nav = [

    { Introduction = "index.md" },
    { "Getting Started" = [
        "getting-started.md",
        { Examples = "examples.md" },
        { "Configuring your request" = "configuring-request.md" },
        { "Resources and Services" = "resources-services.md" },
    ]},
    { "OpenAPI Integration" = "openapi.md" },
    { "Developer's Note" = "dev-note.md" },
    { "API Documentation" = "api.md" },
    { "Release Notes" = "release-notes.md" },
    { "What's New?" = "whats-new.md" },
]

[project.theme]
features = [
    "navigation.path",
    "navigation.sections",
    "content.code.copy",
    "toc.integrate",
    "search.highlight"
]


[[project.theme.palette]]
accent = "teal"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
accent = "teal"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
